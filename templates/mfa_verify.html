<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxWarden - Two-Factor Authentication</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background-color: #050511; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        .mfa-card { background: rgba(22, 22, 36, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        .form-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 14px 16px; border-radius: 6px; color: white; font-size: 1.2rem; text-align: center; letter-spacing: 5px; outline: none; margin-bottom: 20px; transition: 0.3s; }
        .form-input:focus { border-color: #8b5cf6; }
        .btn-submit { width: 100%; padding: 12px; background: linear-gradient(90deg, #7c3aed, #9333ea); border: none; border-radius: 6px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { opacity: 0.9; }
        .error-message { background: rgba(231, 76, 60, 0.15); color: #e74c3c; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; border: 1px solid rgba(231, 76, 60, 0.3); }
    </style>
</head>
<body>
    <div class="mfa-card">
        <h2 style="color: #a78bfa; margin-bottom: 15px;">Two-Factor Authentication</h2>
        <p style="color: #9ca3af; font-size: 0.9rem; margin-bottom: 25px; line-height: 1.5;">Enter the 6-digit code generated by your authenticator app.</p>
        
        {% if error %}
            <div class="error-message">❌ {{ error }}</div>
        {% endif %}

        <form action="{{ url_for('verify_mfa') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" name="token" class="form-input" placeholder="000000" maxlength="6" autocomplete="off" required autofocus>
            <button type="submit" class="btn-submit">Verify</button>
        </form>
    </div>
</body>
</html>
