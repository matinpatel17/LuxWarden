<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxWarden - Setup MFA</title>
    <style>
        body { background-color: #050511; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        .mfa-card { background: rgba(22, 22, 36, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 40px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        .qr-box { background: white; padding: 15px; border-radius: 10px; display: inline-block; margin: 20px 0; }
        .qr-box img { width: 200px; height: 200px; display: block; }
        .form-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 14px; border-radius: 6px; color: white; font-size: 1.1rem; text-align: center; letter-spacing: 2px; outline: none; margin-bottom: 15px; }
        .btn-submit { width: 100%; padding: 12px; background: linear-gradient(90deg, #7c3aed, #9333ea); border: none; border-radius: 6px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="mfa-card">
        <h2 style="color: #a78bfa; margin-bottom: 15px;">Setup Authenticator</h2>
        <p style="color: #9ca3af; font-size: 0.9rem; line-height: 1.5;">Scan this QR code with Google Authenticator, Authy, or your preferred 2FA app.</p>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div style="background: rgba(231, 76, 60, 0.15); color: #e74c3c; padding: 10px; border-radius: 6px; margin-top: 15px; border: 1px solid rgba(231, 76, 60, 0.3);">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="qr-box">
            <img src="data:image/png;base64,{{ qr_code }}" alt="MFA QR Code">
        </div>

        <p style="color: #9ca3af; font-size: 0.8rem; margin-bottom: 20px;">Manual Key: <strong style="color: white; letter-spacing: 1px;">{{ secret }}</strong></p>

        <form action="{{ url_for('setup_mfa') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" name="token" class="form-input" placeholder="Enter 6-digit code" maxlength="6" required autocomplete="off">
            <button type="submit" class="btn-submit">Verify and Enable</button>
        </form>
        
        <a href="{{ url_for('dashboard') }}" style="display: block; margin-top: 20px; color: #9ca3af; text-decoration: none; font-size: 0.9rem;">Cancel</a>
    </div>
</body>
</html>
